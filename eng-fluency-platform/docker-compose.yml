version: '3.8'

services:
  backend:
    build: ./backend
    container_name: eng-fluency-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: eng-fluency-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api/v1

  db:
    image: postgres:15-alpine
    container_name: eng-fluency-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=eng_fluency
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: eng-fluency-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
